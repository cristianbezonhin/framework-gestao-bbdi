<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBDI Gestao — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background-color: #0a0f1c;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(180, 83, 9, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 50% 120%, rgba(120, 53, 15, 0.12) 0%, transparent 70%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(245, 158, 11, 0.15);
      backdrop-filter: blur(12px);
    }
    .input-field {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.25); }
    .input-field:focus {
      outline: none;
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }
    .btn-login {
      background: linear-gradient(135deg, #b45309, #d97706);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .toggle-pw { cursor: pointer; color: rgba(255,255,255,0.3); transition: color 0.2s; }
    .toggle-pw:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="w-full max-w-sm px-4 fade-up">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4"
           style="background:linear-gradient(135deg,#b45309,#d97706)">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zm12-3c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">BBDI Gestao</h1>
      <p class="text-amber-300/80 text-sm mt-1">Metas, projetos e tarefas dos setores</p>
    </div>

    <div class="card rounded-2xl p-7">

      <div id="error-alert" class="error-box rounded-xl px-4 py-3 mb-5 text-sm text-red-400 flex items-center gap-2" style="display:none!important">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        Email ou senha incorretos.
      </div>

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email</label>
          <input type="email" name="email" autocomplete="username" placeholder="seu.email@bbdi.com.br" required
                 class="input-field w-full rounded-xl px-4 py-2.5 text-sm" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Senha</label>
          <div class="relative">
            <input type="password" name="senha" id="password-input" autocomplete="current-password"
                   placeholder="Digite sua senha" required
                   class="input-field w-full rounded-xl px-4 py-2.5 text-sm pr-11" />
            <button type="button" class="toggle-pw absolute right-3 top-1/2 -translate-y-1/2" onclick="togglePw()">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login w-full py-2.5 rounded-xl text-white font-semibold text-sm mt-2">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">BBDI - Gestao Estrategica</p>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error-alert').style.removeProperty('display');
    }
    function togglePw() {
      const i = document.getElementById('password-input');
      i.type = i.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
