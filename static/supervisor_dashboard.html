<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBDI Gestao — Setor</title>
  <link rel="stylesheet" href="/static/shared/theme.css" />
  <script src="/static/shared/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="dashSetor()" x-init="init()">

  <header class="topbar">
    <div style="display:flex; align-items:center; gap:14px;">
      <h1 x-text="setor.nome || 'Setor'"></h1>
      <span class="badge badge-warn" x-text="(setor.template || '').toUpperCase()"></span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <select class="input" style="width:auto;" x-model.number="ano" @change="carregar()">
        <template x-for="a in [anoAtual(), anoAtual() - 1, anoAtual() + 1]">
          <option :value="a" x-text="a"></option>
        </template>
      </select>
      <select class="input" style="width:auto;" x-model.number="trimestre" @change="carregar()">
        <option :value="1">Q1</option>
        <option :value="2">Q2</option>
        <option :value="3">Q3</option>
        <option :value="4">Q4</option>
      </select>
      <span class="user-tag" x-text="me.nome"></span>
      <a x-show="me.papel === 'diretor'" href="/diretor" class="btn btn-ghost">Voltar</a>
      <a href="/logout" class="btn btn-ghost">Sair</a>
    </div>
  </header>

  <main class="container">

    <div class="card" style="padding:18px; margin-bottom:20px; display:grid; grid-template-columns:repeat(4, 1fr); gap:18px;">
      <div>
        <div class="kpi-label" style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Progresso medio</div>
        <div style="font-size:26px; font-weight:700;" x-text="(resumo.objetivos?.progresso_medio ?? 0) + '%'"></div>
      </div>
      <div>
        <div class="kpi-label" style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">
          <span x-text="nivelLabelTopo() + 's'"></span>
        </div>
        <div style="font-size:26px; font-weight:700;" x-text="resumo.objetivos?.total ?? 0"></div>
      </div>
      <div>
        <div class="kpi-label" style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Projetos</div>
        <div style="font-size:26px; font-weight:700;" x-text="resumo.projetos?.total ?? 0"></div>
        <div style="font-size:11px; color:#fca5a5;" x-show="(resumo.projetos?.atrasados ?? 0) > 0"
             x-text="`${resumo.projetos.atrasados} atrasado(s)`"></div>
      </div>
      <div>
        <div class="kpi-label" style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Tarefas feitas</div>
        <div style="font-size:26px; font-weight:700;"
             x-text="`${resumo.tarefas?.feitas ?? 0}/${resumo.tarefas?.total ?? 0}`"></div>
      </div>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <h2 style="margin:0; font-size:18px;" x-text="nivelLabelTopo() + 's do setor'"></h2>
      <button class="btn btn-primary" @click="abrirFormNovo()">+ Novo <span x-text="nivelLabelTopo().toLowerCase()"></span></button>
    </div>

    <div x-show="objetivos.length === 0" class="card" style="padding:32px; text-align:center;">
      <p class="muted">Nenhum item ainda. Clique em "+ Novo" para comecar.</p>
    </div>

    <div style="display:grid; gap:12px;">
      <template x-for="o in objetivos" :key="o.id">
        <div class="card" style="padding:16px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
            <div style="flex:1;">
              <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px;">
                <span class="badge badge-neutral" x-text="NIVEL_LABEL[o.nivel]"></span>
                <span :class="statusBadgeClass(o.status)" x-text="STATUS_LABEL[o.status]"></span>
                <span class="faint" style="font-size:11px;" x-text="`${o.periodo_tipo} ${o.periodo_ano}${o.periodo_trimestre ? ' Q' + o.periodo_trimestre : ''}`"></span>
              </div>
              <a :href="`/objetivos/${o.id}`" style="font-size:15px; font-weight:600; color:var(--text);" x-text="o.titulo"></a>
              <p class="muted" style="margin:6px 0 0 0; font-size:13px;" x-text="o.descricao"></p>
            </div>
            <div style="width:140px; text-align:right;">
              <div style="font-size:20px; font-weight:700;" x-text="o.progresso_pct + '%'"></div>
              <div class="progress" style="margin-top:6px;"><div class="progress-bar" :style="`width:${o.progresso_pct}%`"></div></div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Modal de criacao -->
    <div x-show="form.aberto" x-cloak
         style="position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:50;"
         @click.self="form.aberto = false">
      <div class="card" style="padding:24px; width:520px; max-width:90vw;">
        <h3 style="margin:0 0 16px 0;" x-text="`Novo ${nivelLabelTopo().toLowerCase()}`"></h3>
        <div style="display:grid; gap:12px;">
          <div>
            <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Titulo *</label>
            <input class="input" x-model="form.titulo" placeholder="Ex: Reduzir CPP em 12%" />
          </div>
          <div>
            <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Descricao</label>
            <textarea class="input" x-model="form.descricao" rows="3" placeholder="Por que esse objetivo importa?"></textarea>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
            <div>
              <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Periodo</label>
              <select class="input" x-model="form.periodo_tipo">
                <option value="anual">Anual</option>
                <option value="trimestral">Trimestral</option>
                <option value="mensal">Mensal</option>
              </select>
            </div>
            <div>
              <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Ano</label>
              <input class="input" type="number" x-model.number="form.periodo_ano" />
            </div>
            <div>
              <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Trimestre</label>
              <select class="input" x-model.number="form.periodo_trimestre" :disabled="form.periodo_tipo === 'anual'">
                <option :value="null">—</option>
                <option :value="1">Q1</option><option :value="2">Q2</option>
                <option :value="3">Q3</option><option :value="4">Q4</option>
              </select>
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <div>
              <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Meta (valor)</label>
              <input class="input" type="number" x-model.number="form.meta_valor" placeholder="Ex: 15" />
            </div>
            <div>
              <label style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Unidade</label>
              <input class="input" x-model="form.meta_unidade" placeholder="%, R$, un..." />
            </div>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:18px;">
          <button class="btn btn-ghost" @click="form.aberto = false">Cancelar</button>
          <button class="btn btn-primary" @click="salvarNovo()">Criar</button>
        </div>
      </div>
    </div>

  </main>

  <script>
    function dashSetor() {
      return {
        me: {},
        setor: {},
        ano: anoAtual(),
        trimestre: trimestreAtual(),
        resumo: {},
        objetivos: [],
        form: { aberto: false, titulo: '', descricao: '', periodo_tipo: 'trimestral',
                periodo_ano: anoAtual(), periodo_trimestre: trimestreAtual(),
                meta_valor: null, meta_unidade: '' },

        get setorId() {
          const parts = location.pathname.split('/');
          return parts[2] || '';
        },

        nivelLabelTopo() {
          const map = { okr: 'Objetivo anual', simples: 'Meta', desafios: 'Desafio' };
          return map[this.setor.template] || 'Objetivo';
        },

        async init() {
          try { this.me = await api.get('/api/me'); } catch (_) {}
          try {
            const setor = await api.get(`/api/setores/${this.setorId}`);
            this.setor = setor;
          } catch (e) { alert('Setor: ' + e.message); }
          await this.carregar();
        },

        async carregar() {
          try {
            const dash = await api.get(`/api/dashboard/setor/${this.setorId}?ano=${this.ano}&trimestre=${this.trimestre}`);
            this.resumo = dash.resumo;
            const nivelTopo = { okr: 'objetivo_anual', simples: 'meta', desafios: 'desafio' }[this.setor.template] || 'meta';
            this.objetivos = await api.get(`/api/objetivos?setor=${this.setorId}&nivel=${nivelTopo}&ano=${this.ano}`);
          } catch (e) {
            console.error(e);
          }
        },

        abrirFormNovo() {
          this.form = {
            aberto: true,
            titulo: '', descricao: '',
            periodo_tipo: 'trimestral',
            periodo_ano: this.ano,
            periodo_trimestre: this.trimestre,
            meta_valor: null, meta_unidade: '',
          };
        },

        async salvarNovo() {
          if (!this.form.titulo.trim()) { alert('Titulo obrigatorio.'); return; }
          const nivelTopo = { okr: 'objetivo_anual', simples: 'meta', desafios: 'desafio' }[this.setor.template] || 'meta';
          try {
            await api.post('/api/objetivos', {
              setor_id: this.setorId,
              nivel: nivelTopo,
              titulo: this.form.titulo,
              descricao: this.form.descricao,
              periodo_tipo: this.form.periodo_tipo,
              periodo_ano: this.form.periodo_ano,
              periodo_trimestre: this.form.periodo_tipo === 'anual' ? null : this.form.periodo_trimestre,
              meta_valor: this.form.meta_valor,
              meta_unidade: this.form.meta_unidade,
            });
            this.form.aberto = false;
            await this.carregar();
          } catch (e) {
            alert('Erro ao criar: ' + e.message);
          }
        },
      };
    }
  </script>
</body>
</html>
